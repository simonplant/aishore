# aishore configuration (optional - defaults are sensible)
# All settings here override built-in defaults

# Project name (optional, for display)
# project:
#   name: "My Project"

# Validation command - customize for your stack
# Examples:
#   Node.js: "npm run type-check && npm run lint && npm test"
#   Python:  "pytest && mypy . && ruff check ."
#   Go:      "go test ./... && go vet ./..."
#   Rust:    "cargo test && cargo clippy"
validation:
  command: ""
  timeout: 180

# Models (defaults shown)
# models:
#   primary: "claude-opus-4-6"
#   fast: "claude-sonnet-4-6"

# Agent settings (defaults shown)
# agent:
#   timeout: 3600

# Agent permissions (defaults shown)
# Defaults allow full Bash access so developers can run build/test/lint commands
# (npm install, pytest, go test, cargo build, etc.)
# Restrict if you need a tighter sandbox.
# permissions:
#   developer: "Bash,Edit,Write,Read,Glob,Grep"
#   validator: "Bash,Read,Write,Glob,Grep"
#   reviewer: "Read,Glob,Grep"

# Note: CLAUDE.md is auto-detected from project root
# No context configuration needed
