name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run ShellCheck on aishore CLI
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.aishore'
          severity: warning

      - name: Run ShellCheck on install.sh
        uses: ludeeus/action-shellcheck@master
        with:
          additional_files: 'install.sh'
          severity: warning

  test:
    name: Basic Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Check script is executable
        run: test -x .aishore/aishore

      - name: Syntax check install.sh
        run: bash -n install.sh

      - name: Test metrics command
        run: .aishore/aishore metrics

  drift:
    name: Drift Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Check code ↔ help ↔ docs alignment
        run: bash tests/check-drift.sh --ci

  macos:
    name: macOS Compatibility
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: brew install jq coreutils

      - name: Test help command
        run: .aishore/aishore help

      - name: Test version command
        run: .aishore/aishore version
